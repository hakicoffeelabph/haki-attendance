<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Haki Coffee Lab Attendance</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f7f5f2;
    text-align:center;
}

.header{
    background:#4E342E;
    color:white;
    padding:20px;
}

.header h1{
    margin:0;
}

.container{
    margin:30px auto;
    width:360px;
}

#reader{
    width:100%;
}

#status{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:80px;
}

.success{
    color:#2E7D32;
}

.error{
    color:#C62828;
}
</style>

</head>

<body>

<div class="header">
<h1>☕ Haki Coffee Lab</h1>
<p>Employee QR Attendance</p>
</div>

<div class="container">

<div id="reader"></div>

<div id="status">
Waiting for employee...
</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbx88XmsDUphnfdKVNNVWZ1IUaMlGZ4OUb1xyC5Jd9-6jM9J5dfUU3eGpl6TSOw3IZ_t/exec";

let scanning=true;

function onScanSuccess(decodedText){

    if(!scanning) return;

    scanning=false;

    document.getElementById("status").innerHTML="Processing...";

    fetch(API+"?employeeId="+encodeURIComponent(decodedText))

    .then(r=>r.json())

    .then(data=>{

        if(data.success){

            if(data.action=="IN"){

                document.getElementById("status").className="success";

                document.getElementById("status").innerHTML=
                "✅ Welcome<br><br>"
                +data.employee+
                "<br><br>Time IN Recorded";

            }else{

                document.getElementById("status").className="success";

                document.getElementById("status").innerHTML=
                "👋 Goodbye<br><br>"
                +data.employee+
                "<br><br>Time OUT Recorded";

            }

        }else{

            document.getElementById("status").className="error";

            document.getElementById("status").innerHTML=
            "❌ "+data.message;

        }

        setTimeout(function(){

            document.getElementById("status").className="";

            document.getElementById("status").innerHTML=
            "Waiting for employee...";

            scanning=true;

        },3000);

    })

    .catch(function(){

        document.getElementById("status").className="error";

        document.getElementById("status").innerHTML=
        "Connection Error";

        scanning=true;

    });

}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}).render(onScanSuccess);

</script>

</body>
</html>
