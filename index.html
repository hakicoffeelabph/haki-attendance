<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Haki Coffee Lab Attendance</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            text-align:center;
            margin:40px;
        }

        h1{
            color:#5B3A29;
        }

        #reader{
            width:350px;
            margin:auto;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            color:green;
            font-weight:bold;
        }
    </style>

</head>

<body>

<h1>☕ Haki Coffee Lab</h1>

<h2>Scan Employee QR</h2>

<div id="reader"></div>

<div id="result">Waiting for QR...</div>

<script>

function onScanSuccess(decodedText){

    document.getElementById("result").innerHTML =
        "Employee ID: " + decodedText;

}

new Html5QrcodeScanner(
    "reader",
    {
        fps:10,
        qrbox:250
    }
).render(onScanSuccess);

</script>

</body>
</html>
