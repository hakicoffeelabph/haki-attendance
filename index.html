<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Haki Coffee Lab Crew Attendance</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:
    linear-gradient(rgba(248,244,239,.88), rgba(248,244,239,.88)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;

    text-align:center;

    color:#3E2723;

}

.header{

    background:#4E342E;

    color:white;

    padding:20px;

    box-shadow:0 3px 10px rgba(0,0,0,.3);

}

.logo{

    width:120px;

    border-radius:12px;

    margin-bottom:10px;

}

.header h1{

    font-size:32px;

}

.header p{

    opacity:.9;

}

.container{

    width:420px;

    margin:25px auto;

}

#reader{

    width:100%;

    border-radius:15px;

    overflow:hidden;

}

#status{

    margin-top:20px;

    background:rgba(255,255,255,.95);

    border-radius:18px;

    padding:25px;

    min-height:260px;

    box-shadow:0 10px 25px rgba(0,0,0,.2);

}

.success{

    color:#2E7D32;

}

.error{

    color:#C62828;

}

.waiting{

    color:#6D4C41;

}

.footer{

    margin-top:20px;

    color:#4E342E;

    font-size:12px;

}

</style>

</head>

<body>

<div class="header">

<!-- Replace YOUR_LOGO_URL with your logo URL -->
<!-- Example: https://raw.githubusercontent.com/.../logo.png -->

<!-- <img src="YOUR_LOGO_URL" class="logo"> -->

<h1>HAKI COFFEE LAB</h1>

<p>Crew Attendance System</p>

</div>

<div class="container">

<div id="reader"></div>

<div id="status" class="waiting">

<div style="font-size:65px;">🏴‍☠️</div>

<h2>Welcome, Crew Member!</h2>

<br>

<p>📷 Scan your Crew QR Pass</p>

</div>

<div class="footer">

Powered by Haki Coffee Lab System

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx88XmsDUphnfdKVNNVWZ1IUaMlGZ4OUb1xyC5Jd9-6jM9J5dfUU3eGpl6TSOw3IZ_t/exec";

let scanning=true;

function onScanSuccess(decodedText){

if(!scanning) return;

scanning=false;

document.getElementById("status").className="waiting";
document.getElementById("status").innerHTML="<h2>Processing...</h2>";

fetch(API+"?employeeId="+encodeURIComponent(decodedText))

.then(r=>r.json())

.then(data=>{

console.log(data);
alert(JSON.stringify(data));

const now=new Date();

const time=now.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

if(data.success){

document.getElementById("status").className="success";

if(data.action==="TIME IN"){

document.getElementById("status").innerHTML=`

<div style="font-size:30px;">🏴‍☠️</div>

<h2 style="color:#5B3A29;">Welcome aboard!</h2>

<h1>${data.employee}</h1>

<br>

<p style="font-size:22px;">

Your shift has officially begun.

<br><br>

<strong>Let's set sail!</strong>

</p>

<br>

<h2 style="color:#8B5E3C;">

⚓ Time IN: ${time}

</h2>

`;

}else{

document.getElementById("status").innerHTML=`

<div style="font-size:30px;">⚓</div>

<h2 style="color:#5B3A29;">

Voyage Complete!

</h2>

<h1>${data.employee}</h1>

<br>

<p style="font-size:22px;">

Great work today! 🌟

</p>

<br>

<h2 style="color:#8B5E3C;">

⚓ Time OUT: ${time}

</h2>

<br>

<p style="font-size:20px;">

See you on the next adventure!

</p>

`;

}

}else{

document.getElementById("status").className="error";

document.getElementById("status").innerHTML=`

<div style="font-size:60px;">❌</div>

<h2>${data.message}</h2>

<p>Please contact your Captain.</p>

`;

}

setTimeout(function(){

document.getElementById("status").className="waiting";

document.getElementById("status").innerHTML=`

<div style="font-size:65px;">🏴‍☠️</div>

<h2>Welcome, Crew Member!</h2>

<br>

<p>📷 Scan your Crew QR Pass</p>

`;

scanning=true;

},4000);

})

.catch(function(){

document.getElementById("status").className="error";

document.getElementById("status").innerHTML=`

<div style="font-size:60px;">⚠️</div>

<h2>Connection Error</h2>

<p>Unable to reach attendance server.</p>

`;

scanning=true;

});

}

new Html5QrcodeScanner("reader",{

fps:10,

qrbox:250

}).render(onScanSuccess);

</script>

</body>
</html>
